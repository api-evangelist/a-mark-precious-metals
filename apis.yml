aid: a-mark-precious-metals
url: >-
  https://raw.githubusercontent.com/api-evangelist/a-mark-precious-metals/refs/heads/main/apis.yml
name: A-Mark Precious Metals
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Precious Metals
  - Trading
  - Wholesale
  - Gold
  - Silver
  - Bullion
  - Finance
description: >-
  A-Mark Precious Metals is a full-service precious metals trading company that wholesales
  gold, silver, platinum, and palladium bullion and coins to dealers, financial institutions,
  and investors. They operate trading desks 17 hours daily across global locations (US, Asia,
  Vienna) and offer wholesale sales, direct-to-consumer, logistics and storage, minting, and
  collateralized loans services.
created: '2026-04-19'
modified: '2026-04-19'
specificationVersion: '0.19'
apis:
  - aid: a-mark-precious-metals:a-mark-wholesale-trading
    name: A-Mark Wholesale Trading
    tags:
      - Precious Metals
      - Trading
      - Wholesale
      - Gold
      - Silver
      - Platinum
      - Palladium
    humanURL: https://www.amark.com
    properties:
      - url: https://www.amark.com/services
        type: Documentation
    description: >-
      A-Mark's wholesale precious metals trading platform enables dealers and financial
      institutions to buy and sell gold, silver, platinum, and palladium bullion products.
      Offers spot, forward, and deferred transactions with limit and stop orders,
      48-hour settlement, and payment in USD, EUR, or product.

  - aid: a-mark-precious-metals:a-mark-logistics-storage
    name: A-Mark Logistics and Storage
    tags:
      - Precious Metals
      - Logistics
      - Storage
      - Warehousing
    humanURL: https://www.amark.com/services
    properties:
      - url: https://www.amark.com/services
        type: Documentation
    description: >-
      A-Mark provides comprehensive logistics, receiving, storage, and delivery services
      for precious metals through state-of-the-art facilities. Includes precious metals
      leases and consignments with competitive rates.

  - aid: a-mark-precious-metals:a-mark-minting
    name: A-Mark Minting
    tags:
      - Precious Metals
      - Minting
      - Custom Coins
      - Manufacturing
    humanURL: https://www.amark.com/services
    properties:
      - url: https://www.amark.com/services
        type: Documentation
    description: >-
      A-Mark offers custom minting services blending traditional craftsmanship with
      modern technology for production of precious metal coins, bars, and rounds
      from sovereign and private mints worldwide.

  - aid: a-mark-precious-metals:a-mark-collateralized-loans
    name: A-Mark Collateralized Loans
    tags:
      - Precious Metals
      - Finance
      - Loans
      - Collateral
    humanURL: https://www.amark.com/services
    properties:
      - url: https://www.amark.com/services
        type: Documentation
    description: >-
      A-Mark provides financing options using precious metals as collateral, offering
      collateralized loans to qualified commercial customers against precious metal
      holdings.

common:
  - type: Website
    url: https://www.amark.com
  - type: Documentation
    url: https://www.amark.com/services
  - type: Contact
    url: https://www.amark.com/contact
  - type: Features
    data:
      - name: Wholesale Trading
        description: >-
          Bulk precious metals trading with market making through trading desks
          operating 17 hours daily across US, Asia, and Vienna locations.
      - name: Spot and Forward Transactions
        description: >-
          Spot and forward deferred transactions for qualified commercial customers
          in gold, silver, platinum, and palladium.
      - name: Order Types
        description: >-
          Limit orders, stop orders, and immediate execution capabilities for
          flexible precious metals trading strategies.
      - name: Settlement Options
        description: >-
          48-hour settlement with payment accepted in US Dollars, Euros, or product.
      - name: Storage and Logistics
        description: >-
          State-of-the-art facilities for receiving, storage, and delivery of
          precious metals products globally.
      - name: Custom Minting
        description: >-
          Custom minting services for coins, bars, and rounds blending traditional
          craftsmanship with modern production technology.
      - name: Collateralized Financing
        description: >-
          Precious metals leases, consignments, and collateralized loans with
          competitive rates for qualified customers.
      - name: Direct-to-Consumer
        description: >-
          Retail precious metals sales to individual consumers through their
          JMBullion.com brand.
  - type: UseCases
    data:
      - name: Wholesale Dealer Trading
        description: >-
          Precious metals dealers purchasing bulk gold, silver, platinum, and palladium
          bullion for resale to retail customers.
      - name: Financial Institution Hedging
        description: >-
          Banks and financial institutions trading precious metals for portfolio
          hedging, risk management, and investment purposes.
      - name: Investor Bullion Acquisition
        description: >-
          Institutional investors acquiring physical precious metals as a store
          of value and inflation hedge.
      - name: Logistics and Custody
        description: >-
          Dealers and institutions using A-Mark's storage and logistics services
          for secure precious metals custody and delivery.
      - name: Custom Coin Production
        description: >-
          Organizations commissioning custom precious metal coins, bars, and rounds
          for commemorative, promotional, or commercial purposes.
      - name: Precious Metals Financing
        description: >-
          Businesses leveraging precious metals holdings as collateral for
          working capital financing and liquidity.
  - type: Integrations
    data:
      - name: JMBullion.com
        description: >-
          A-Mark's direct-to-consumer retail brand for individual precious metals
          buyers selling gold, silver, platinum, and palladium.
      - name: Global Trading Desks
        description: >-
          Integrated trading operations across US, Asian, and European (Vienna)
          offices for 17-hour daily market coverage.
      - name: Sovereign and Private Mints
        description: >-
          Sourcing relationships with sovereign and private mints worldwide for
          diverse product availability and custom minting.
