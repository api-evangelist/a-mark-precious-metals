principles:
  - name: Visibility
    description: Track integration cost as part of trading-desk operations and metals procurement spend;
      A-Mark does not provide a metered usage feed.
  - name: Allocation
    description: Allocate integration cost to the trading or treasury function that owns the wholesale
      relationship.
  - name: Optimization
    description: Optimize quote/order flows by batching where the contract allows and aligning trading
      activity with desk hours.
  - name: Accountability
    description: Trading operations leadership owns the relationship; IT owns integration runtime. Review
      transaction volume during quarterly business reviews with A-Mark.
